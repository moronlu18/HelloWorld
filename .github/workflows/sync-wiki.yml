name: Sync README to Wiki

on:
  push:
    branches: ["main"]
    paths:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate wiki pages
        run: |
          mkdir -p wiki-content
          mkdir -p wiki-content/img
          
          cp README.md wiki-content/Home.md
          
          if [ -d "img" ]; then
            cp -r img/* wiki-content/img/ 2>/dev/null || true
          fi
          
          # Create _Sidebar.md with links to sections
          echo "* [Home](Home)" > wiki-content/_Sidebar.md
          while IFS= read -r line; do
            heading=$(echo "$line" | sed 's/^#* *//')
            # GitHub Wiki anchor: lowercase, spaces to hyphens, remove accents
            anchor=$(echo "$heading" | \
              tr '[:upper:]' '[:lower:]' | \
              sed 's/\xc3\xa1/a/g; s/\xc3\xa9/e/g; s/\xc3\xad/i/g; s/\xc3\xb3/o/g; s/\xc3\xba/u/g; s/\xc3\xb1/n/g' | \
              tr ' ' '-' | \
              sed 's/[^a-z0-9-]//g' | \
              sed 's/--*/-/g' | \
              sed 's/^-//; s/-$//')
            echo "* [${heading}](Home#${anchor})" >> wiki-content/_Sidebar.md
          done < <(grep -E "^#{1,3} " README.md)
          
          echo "=== Sidebar content ==="
          cat wiki-content/_Sidebar.md

      - name: Push to Wiki
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_TOKEN }}
        run: |
          if [ -z "$WIKI_TOKEN" ]; then
            echo "Error: WIKI_TOKEN secret not configured"
            exit 1
          fi
          
          echo "=== Setting up git ==="
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper store
          
          echo "https://${WIKI_TOKEN}@github.com" > ~/.git-credentials
          
          echo "=== Cloning wiki ==="
          git clone https://github.com/${{ github.repository }}.wiki.git wiki-repo
          cd wiki-repo
          
          # Delete everything
          git rm -rf . 2>/dev/null || true
          git commit -m "cleanup" 2>/dev/null || true
          
          # Copy new content
          cp -r ../wiki-content/* .
          
          echo "=== Files to upload ==="
          ls -la
          
          echo "=== Pushing to wiki ==="
          git add .
          git commit -m "docs: update wiki"
          git push
